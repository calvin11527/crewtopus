# Quiet Dependabot: security + small bumps only. Avoids flooding with major upgrades.
version: 2
updates:
  # Root workspace lockfile (covers most transitive + workspace deps)
  - package-ecosystem: npm
    directory: "/src"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Major upgrades need manual review (breaking)
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - github-actions
    groups:
      actions:
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
