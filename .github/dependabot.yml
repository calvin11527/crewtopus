version: 2
updates:
  - package-ecosystem: npm
    directory: "/src"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - security
    groups:
      production-deps:
        dependency-type: production
        update-types:
          - minor
          - patch
      development-deps:
        dependency-type: development
        update-types:
          - minor
          - patch

  - package-ecosystem: npm
    directory: "/src/backend"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies

  - package-ecosystem: npm
    directory: "/src/frontend"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
      - github-actions
