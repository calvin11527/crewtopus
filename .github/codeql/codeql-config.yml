name: Crewtopus CodeQL config

paths:
  - src/backend
  - src/frontend

paths-ignore:
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/*.test.ts"
  - "**/*.test.tsx"
  - "**/__tests__/**"
  - "docs/**"
  - "src/infra/**"
  - "src/scripts/**"

# Paths that intentionally accept user-selected local folders after allowlist checks
# (local-first desktop tool). Validated via isPathAllowed / resolveWithinRoot.
query-filters:
  - exclude:
      id: js/path-injection
      paths: |
        src/backend/src/utils/safe-path.ts
        src/backend/src/modules/fs-browse.ts
