name: Feature request
description: Suggest an improvement or new capability
title: "[feat] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What friction are you hitting today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How should Crewtopus behave instead?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Board / lifecycle
        - Agents / adapters
        - Privacy / audit
        - Onboarding / docs
        - Infra / Docker
        - Other
