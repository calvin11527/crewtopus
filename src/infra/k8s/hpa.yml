###############################################################################
# AgentHub – Horizontal Pod Autoscalers (min 1, max 2)
###############################################################################
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: agenthub-backend
  namespace: agent-hub
  labels:
    app.kubernetes.io/part-of: agent-hub
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: agenthub-backend
  minReplicas: 1
  maxReplicas: 2
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
