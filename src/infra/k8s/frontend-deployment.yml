###############################################################################
# AgentHub – Frontend Deployment & Service (Kubernetes)
###############################################################################
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: agent-hub
  labels:
    app: agenthub-frontend
data:
  default.conf: |
    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml;

        location /api/ {
            proxy_pass http://agenthub-backend.agent-hub.svc.cluster.local:3000/api/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }

        location /metrics {
            proxy_pass http://agenthub-backend.agent-hub.svc.cluster.local:3000/metrics;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }

        location /ws {
            proxy_pass http://agenthub-backend.agent-hub.svc.cluster.local:3000/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 3600s;
        }

        location / {
            try_files $uri $uri/ /index.html;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: agenthub-frontend
  namespace: agent-hub
  labels:
    app: agenthub-frontend
    app.kubernetes.io/part-of: agent-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agenthub-frontend
  template:
    metadata:
      labels:
        app: agenthub-frontend
        app.kubernetes.io/part-of: agent-hub
    spec:
      containers:
        - name: frontend
          image: agenthub-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
              readOnly: true
      volumes:
        - name: nginx-config
          configMap:
            name: frontend-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: agenthub-frontend
  namespace: agent-hub
  labels:
    app: agenthub-frontend
    app.kubernetes.io/part-of: agent-hub
spec:
  type: LoadBalancer
  selector:
    app: agenthub-frontend
  ports:
    - name: http
      port: 80
      targetPort: 80
      protocol: TCP