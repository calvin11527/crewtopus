###############################################################################
# AgentHub – Prometheus Configuration
###############################################################################
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

# Alertmanager (uncomment when ready)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets: ["alertmanager:9093"]

rule_files:
  - "/etc/prometheus/rules/*.yml"

scrape_configs:
  # -------------------------------------------------------------------------
  # Prometheus self-monitoring
  # -------------------------------------------------------------------------
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
        labels:
          service: "prometheus"

  # -------------------------------------------------------------------------
  # AgentHub backend (Docker Compose service)
  # -------------------------------------------------------------------------
  - job_name: "agenthub-backend"
    metrics_path: "/metrics"
    scrape_interval: 10s
    static_configs:
      - targets: ["agenthub-backend:3000"]
        labels:
          service: "agenthub"
          environment: "docker"

  # -------------------------------------------------------------------------
  # Node Exporter (optional – install separately)
  # -------------------------------------------------------------------------
  - job_name: "node-exporter"
    scrape_interval: 30s
    static_configs:
      - targets: ["host.docker.internal:9100"]
        labels:
          service: "node-exporter"

  # -------------------------------------------------------------------------
  # Redis Exporter (optional – add redis-exporter service to compose)
  # -------------------------------------------------------------------------
  # - job_name: "redis"
  #   static_configs:
  #     - targets: ["redis-exporter:9121"]
  #       labels:
  #         service: "redis"
